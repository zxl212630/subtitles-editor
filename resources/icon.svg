<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- 背景渐变：从深邃蓝到科技紫 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    
    <!-- 播放键微渐变：呈现轻微的 3D 白瓷质感 -->
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>

    <!-- 阴影滤镜，使播放键和横条更立体 -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 渐变圆角背景 -->
  <rect width="1024" height="1024" rx="256" fill="url(#bgGrad)"/>
  
  <!-- 播放按钮，加上投影和微渐变，等比放大16倍 -->
  <path d="M432 152c-22.4-12.8-40-1.6-40 24v256c0 25.6 17.6 36.8 40 24l222.4-128c22.4-12.8 22.4-35.2 0-48l-222.4-128z" fill="url(#playGrad)" filter="url(#dropShadow)"/>
  
  <!-- 字幕横线条 (下半部分) -->
  <!-- 第一排：高亮白，略带投影 -->
  <rect x="128" y="608" width="448" height="96" rx="48" fill="#ffffff" fill-opacity="0.95" filter="url(#dropShadow)"/>
  <rect x="640" y="608" width="256" height="96" rx="48" fill="#ffffff" fill-opacity="0.95" filter="url(#dropShadow)"/>
  
  <!-- 第二排：稍微淡化，形成主次层级 -->
  <rect x="128" y="768" width="128" height="96" rx="48" fill="#ffffff" fill-opacity="0.65" filter="url(#dropShadow)"/>
  <rect x="320" y="768" width="576" height="96" rx="48" fill="#ffffff" fill-opacity="0.65" filter="url(#dropShadow)"/>
</svg>
