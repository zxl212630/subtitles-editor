<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Double box representing two snapped blocks -->
  <rect x="4" y="9" width="16" height="6" rx="1"/>
  <line x1="12" y1="9" x2="12" y2="15"/>

  <!-- Top snap rays -->
  <line x1="12" y1="6" x2="12" y2="3"/>
  <line x1="9" y1="7" x2="6.5" y2="4.5"/>
  <line x1="15" y1="7" x2="17.5" y2="4.5"/>

  <!-- Bottom snap rays -->
  <line x1="12" y1="18" x2="12" y2="21"/>
  <line x1="9" y1="17" x2="6.5" y2="19.5"/>
  <line x1="15" y1="17" x2="17.5" y2="19.5"/>
</svg>
