name: Build Dependencies

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Component to build (all, ffmpeg, qt6, qwindowkit)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ffmpeg
          - qt6
          - qwindowkit
      arch:
        description: 'Architecture to build (all, arm64, x64)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - arm64
          - x64
      qt_version:
        description: 'Qt version to compile (if building qt6 or all)'
        required: false
        default: '6.5.9'
      ffmpeg_version:
        description: 'FFmpeg version to compile (if building ffmpeg or all)'
        required: false
        default: '8.1.1'
      copy_from_tag:
        description: 'Base release tag to copy other unchanged dependencies from (auto-detect if empty)'
        required: false
        default: ''
      deps_tag:
        description: 'Tag for the dependency release (e.g. deps-v1)'
        required: true
        default: 'deps-v1.3'
      force_rebuild:
        description: 'Force rebuild all dependencies (do not copy/download existing ones)'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'trigger-deps-*'

permissions:
  contents: write

jobs:
  setup-env:
    runs-on: ubuntu-latest
    outputs:
      deps_tag: ${{ steps.env.outputs.deps_tag }}
      base_tag: ${{ steps.env.outputs.base_tag }}
      force_rebuild: ${{ steps.env.outputs.force_rebuild }}
      qt_version: ${{ steps.env.outputs.qt_version }}
      ffmpeg_version: ${{ steps.env.outputs.ffmpeg_version }}
    steps:
      - name: Compute env outputs
        id: env
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DEPS_TAG="${{ inputs.deps_tag }}"
            FORCE_REBUILD="${{ inputs.force_rebuild }}"
            QT_VERSION="${{ inputs.qt_version }}"
            FFMPEG_VERSION="${{ inputs.ffmpeg_version }}"
          else
            REF_NAME="${{ github.ref_name }}"
            if [[ "$REF_NAME" =~ ^trigger-deps-(.+)$ ]]; then
              DEPS_TAG="deps-${BASH_REMATCH[1]}"
            else
              DEPS_TAG="deps-v1.3"
            fi
            FORCE_REBUILD="false"
            QT_VERSION="6.5.9"
            FFMPEG_VERSION="8.1.1"
          fi
          echo "deps_tag=$DEPS_TAG" >> "$GITHUB_OUTPUT"
          echo "force_rebuild=$FORCE_REBUILD" >> "$GITHUB_OUTPUT"
          echo "qt_version=$QT_VERSION" >> "$GITHUB_OUTPUT"
          echo "ffmpeg_version=$FFMPEG_VERSION" >> "$GITHUB_OUTPUT"

          if [[ -n "${{ inputs.copy_from_tag }}" ]]; then
            echo "base_tag=${{ inputs.copy_from_tag }}" >> "$GITHUB_OUTPUT"
          else
            BASE_TAG=$(gh release list --limit 100 --repo "${{ github.repository }}" | cut -f1 | \
              grep -E "^deps-v" | grep -v -x "$DEPS_TAG" | head -n 1 || true)
            echo "base_tag=$BASE_TAG" >> "$GITHUB_OUTPUT"
          fi

  # --- macOS Jobs ---
  build-ffmpeg-macos:
    needs: setup-env
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x64
            runner: macos-15-intel
    env:
      DEPS_TAG: ${{ needs.setup-env.outputs.deps_tag }}
      BASE_TAG: ${{ needs.setup-env.outputs.base_tag }}
      FORCE_REBUILD: ${{ needs.setup-env.outputs.force_rebuild }}
      FFMPEG_VERSION: ${{ needs.setup-env.outputs.ffmpeg_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check or Copy FFmpeg package
        id: check-cache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE_NAME="ffmpeg-macos-${{ matrix.arch }}.tar.zst"
          if gh release view "$DEPS_TAG" --repo "${{ github.repository }}" | grep -q "$FILE_NAME"; then
            echo "Package $FILE_NAME already exists in $DEPS_TAG. Skipping build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$FORCE_REBUILD" != "true" && -n "$BASE_TAG" ]]; then
            echo "Checking if $FILE_NAME exists in base release $BASE_TAG..."
            if gh release view "$BASE_TAG" --repo "${{ github.repository }}" | grep -q "$FILE_NAME"; then
              echo "Found $FILE_NAME in $BASE_TAG. Copying to $DEPS_TAG..."
              gh release download "$BASE_TAG" -p "$FILE_NAME" --repo "${{ github.repository }}"
              gh release upload "$DEPS_TAG" "$FILE_NAME" --clobber --repo "${{ github.repository }}"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Install build tools
        if: steps.check-cache.outputs.skip != 'true'
        run: |
          brew install autoconf automake libtool nasm yasm pkg-config cmake zstd

      - name: Build FFmpeg
        if: steps.check-cache.outputs.skip != 'true'
        run: |
          ./scripts/build-deps-macos.sh \
            --arch ${{ matrix.arch }} \
            --output ${{ runner.temp }}/deps-output \
            --ffmpeg-version $FFMPEG_VERSION \
            --target ffmpeg \
            --jobs $(sysctl -n hw.ncpu)

      - name: Upload FFmpeg package
        if: steps.check-cache.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$DEPS_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 || {
            gh release create "$DEPS_TAG" --prerelease --title "$DEPS_TAG" --notes "Pre-compiled dependencies" --repo "${{ github.repository }}"
          }
          gh release upload "$DEPS_TAG" "${{ runner.temp }}/deps-output/ffmpeg-macos-${{ matrix.arch }}.tar.zst" --clobber --repo "${{ github.repository }}"

  build-qt-macos:
    needs: setup-env
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x64
            runner: macos-15-intel
    env:
      DEPS_TAG: ${{ needs.setup-env.outputs.deps_tag }}
      BASE_TAG: ${{ needs.setup-env.outputs.base_tag }}
      FORCE_REBUILD: ${{ needs.setup-env.outputs.force_rebuild }}
      QT_VERSION: ${{ needs.setup-env.outputs.qt_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/share/boost /usr/local/lib/android /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/go /opt/hostedtoolcache/node /opt/hostedtoolcache/python /opt/hostedtoolcache/ruby

      - name: Check or Copy Qt package
        id: check-cache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE_NAME="qt6-macos-${{ matrix.arch }}.tar.zst"
          if gh release view "$DEPS_TAG" --repo "${{ github.repository }}" | grep -q "$FILE_NAME"; then
            echo "Package $FILE_NAME already exists in $DEPS_TAG. Skipping build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$FORCE_REBUILD" != "true" && -n "$BASE_TAG" ]]; then
            echo "Checking if $FILE_NAME exists in base release $BASE_TAG..."
            if gh release view "$BASE_TAG" --repo "${{ github.repository }}" | grep -q "$FILE_NAME"; then
              echo "Found $FILE_NAME in $BASE_TAG. Copying to $DEPS_TAG..."
              gh release download "$BASE_TAG" -p "$FILE_NAME" --repo "${{ github.repository }}"
              gh release upload "$DEPS_TAG" "$FILE_NAME" --clobber --repo "${{ github.repository }}"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Install build tools
        if: steps.check-cache.outputs.skip != 'true'
        run: |
          brew install autoconf automake libtool nasm yasm pkg-config cmake zstd

      - name: Build Qt
        if: steps.check-cache.outputs.skip != 'true'
        run: |
          ./scripts/build-deps-macos.sh \
            --arch ${{ matrix.arch }} \
            --output ${{ runner.temp }}/deps-output \
            --qt-version $QT_VERSION \
            --target qt6 \
            --jobs $(sysctl -n hw.ncpu)

      - name: Upload Qt package
        if: steps.check-cache.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$DEPS_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 || {
            gh release create "$DEPS_TAG" --prerelease --title "$DEPS_TAG" --notes "Pre-compiled dependencies" --repo "${{ github.repository }}"
          }
          gh release upload "$DEPS_TAG" "${{ runner.temp }}/deps-output/qt6-macos-${{ matrix.arch }}.tar.zst" --clobber --repo "${{ github.repository }}"

  build-qwindowkit-macos:
    needs: [setup-env, build-qt-macos]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x64
            runner: macos-15-intel
    env:
      DEPS_TAG: ${{ needs.setup-env.outputs.deps_tag }}
      BASE_TAG: ${{ needs.setup-env.outputs.base_tag }}
      FORCE_REBUILD: ${{ needs.setup-env.outputs.force_rebuild }}
    steps:
      - uses: actions/checkout@v4

      - name: Check or Copy QWindowKit package
        id: check-cache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE_NAME="qwindowkit-macos-${{ matrix.arch }}.tar.zst"
          if gh release view "$DEPS_TAG" --repo "${{ github.repository }}" | grep -q "$FILE_NAME"; then
            echo "Package $FILE_NAME already exists in $DEPS_TAG. Skipping build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$FORCE_REBUILD" != "true" && -n "$BASE_TAG" ]]; then
            echo "Checking if $FILE_NAME exists in base release $BASE_TAG..."
            if gh release view "$BASE_TAG" --repo "${{ github.repository }}" | grep -q "$FILE_NAME"; then
              echo "Found $FILE_NAME in $BASE_TAG. Copying to $DEPS_TAG..."
              gh release download "$BASE_TAG" -p "$FILE_NAME" --repo "${{ github.repository }}"
              gh release upload "$DEPS_TAG" "$FILE_NAME" --clobber --repo "${{ github.repository }}"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Install build tools
        if: steps.check-cache.outputs.skip != 'true'
        run: |
          brew install autoconf automake libtool nasm yasm pkg-config cmake zstd

      - name: Download Qt dependency
        if: steps.check-cache.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$DEPS_TAG" -p "qt6-macos-${{ matrix.arch }}.tar.zst" --repo "${{ github.repository }}"
          mkdir -p "${{ runner.temp }}/deps-output"
          zstd -d -c "qt6-macos-${{ matrix.arch }}.tar.zst" | tar -xf - -C "${{ runner.temp }}/deps-output"

      - name: Build QWindowKit
        if: steps.check-cache.outputs.skip != 'true'
        run: |
          ./scripts/build-deps-macos.sh \
            --arch ${{ matrix.arch }} \
            --output ${{ runner.temp }}/deps-output \
            --target qwindowkit \
            --jobs $(sysctl -n hw.ncpu)

      - name: Upload QWindowKit package
        if: steps.check-cache.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$DEPS_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 || {
            gh release create "$DEPS_TAG" --prerelease --title "$DEPS_TAG" --notes "Pre-compiled dependencies" --repo "${{ github.repository }}"
          }
          gh release upload "$DEPS_TAG" "${{ runner.temp }}/deps-output/qwindowkit-macos-${{ matrix.arch }}.tar.zst" --clobber --repo "${{ github.repository }}"


  # --- Windows Jobs ---
  build-ffmpeg-windows:
    needs: setup-env
    runs-on: windows-latest
    env:
      DEPS_TAG: ${{ needs.setup-env.outputs.deps_tag }}
      BASE_TAG: ${{ needs.setup-env.outputs.base_tag }}
      FORCE_REBUILD: ${{ needs.setup-env.outputs.force_rebuild }}
      FFMPEG_VERSION: ${{ needs.setup-env.outputs.ffmpeg_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check or Copy FFmpeg package
        id: check-cache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          FILE_NAME="ffmpeg-windows-x64.zip"
          if gh release view "$DEPS_TAG" --repo "${{ github.repository }}" | grep -q "$FILE_NAME"; then
            echo "Package $FILE_NAME already exists in $DEPS_TAG. Skipping build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$FORCE_REBUILD" != "true" && -n "$BASE_TAG" ]]; then
            echo "Checking if $FILE_NAME exists in base release $BASE_TAG..."
            if gh release view "$BASE_TAG" --repo "${{ github.repository }}" | grep -q "$FILE_NAME"; then
              echo "Found $FILE_NAME in $BASE_TAG. Copying to $DEPS_TAG..."
              gh release download "$BASE_TAG" -p "$FILE_NAME" --repo "${{ github.repository }}"
              gh release upload "$DEPS_TAG" "$FILE_NAME" --clobber --repo "${{ github.repository }}"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Setup MSVC
        if: steps.check-cache.outputs.skip != 'true'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup MSYS2
        if: steps.check-cache.outputs.skip != 'true'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          install: make diffutils pkgconf yasm git

      - name: Build FFmpeg
        if: steps.check-cache.outputs.skip != 'true'
        shell: pwsh
        run: |
          ./scripts/build-deps-windows.ps1 -TargetDir "D:\deps-build" -OutputDir "D:\deps-output" -FFmpegVersion "$env:FFMPEG_VERSION" -Target ffmpeg

      - name: Upload FFmpeg package
        if: steps.check-cache.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release view "$DEPS_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 || {
            gh release create "$DEPS_TAG" --prerelease --title "$DEPS_TAG" --notes "Pre-compiled dependencies" --repo "${{ github.repository }}"
          }
          gh release upload "$DEPS_TAG" "D:/deps-output/ffmpeg-windows-x64.zip" --clobber --repo "${{ github.repository }}"

  build-qt-windows:
    needs: setup-env
    runs-on: windows-latest
    env:
      DEPS_TAG: ${{ needs.setup-env.outputs.deps_tag }}
      BASE_TAG: ${{ needs.setup-env.outputs.base_tag }}
      FORCE_REBUILD: ${{ needs.setup-env.outputs.force_rebuild }}
      QT_VERSION: ${{ needs.setup-env.outputs.qt_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check or Copy Qt package
        id: check-cache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          FILE_NAME="qt6-windows-x64.zip"
          if gh release view "$DEPS_TAG" --repo "${{ github.repository }}" | grep -q "$FILE_NAME"; then
            echo "Package $FILE_NAME already exists in $DEPS_TAG. Skipping build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$FORCE_REBUILD" != "true" && -n "$BASE_TAG" ]]; then
            echo "Checking if $FILE_NAME exists in base release $BASE_TAG..."
            if gh release view "$BASE_TAG" --repo "${{ github.repository }}" | grep -q "$FILE_NAME"; then
              echo "Found $FILE_NAME in $BASE_TAG. Copying to $DEPS_TAG..."
              gh release download "$BASE_TAG" -p "$FILE_NAME" --repo "${{ github.repository }}"
              gh release upload "$DEPS_TAG" "$FILE_NAME" --clobber --repo "${{ github.repository }}"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Setup MSVC
        if: steps.check-cache.outputs.skip != 'true'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build Qt
        if: steps.check-cache.outputs.skip != 'true'
        shell: pwsh
        run: |
          ./scripts/build-deps-windows.ps1 -TargetDir "D:\deps-build" -OutputDir "D:\deps-output" -QtVersion "$env:QT_VERSION" -Target qt6

      - name: Upload Qt package
        if: steps.check-cache.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release view "$DEPS_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 || {
            gh release create "$DEPS_TAG" --prerelease --title "$DEPS_TAG" --notes "Pre-compiled dependencies" --repo "${{ github.repository }}"
          }
          gh release upload "$DEPS_TAG" "D:/deps-output/qt6-windows-x64.zip" --clobber --repo "${{ github.repository }}"

  build-qwindowkit-windows:
    needs: [setup-env, build-qt-windows]
    runs-on: windows-latest
    env:
      DEPS_TAG: ${{ needs.setup-env.outputs.deps_tag }}
      BASE_TAG: ${{ needs.setup-env.outputs.base_tag }}
      FORCE_REBUILD: ${{ needs.setup-env.outputs.force_rebuild }}
    steps:
      - uses: actions/checkout@v4

      - name: Check or Copy QWindowKit package
        id: check-cache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          FILE_NAME="qwindowkit-windows-x64.zip"
          if gh release view "$DEPS_TAG" --repo "${{ github.repository }}" | grep -q "$FILE_NAME"; then
            echo "Package $FILE_NAME already exists in $DEPS_TAG. Skipping build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$FORCE_REBUILD" != "true" && -n "$BASE_TAG" ]]; then
            echo "Checking if $FILE_NAME exists in base release $BASE_TAG..."
            if gh release view "$BASE_TAG" --repo "${{ github.repository }}" | grep -q "$FILE_NAME"; then
              echo "Found $FILE_NAME in $BASE_TAG. Copying to $DEPS_TAG..."
              gh release download "$BASE_TAG" -p "$FILE_NAME" --repo "${{ github.repository }}"
              gh release upload "$DEPS_TAG" "$FILE_NAME" --clobber --repo "${{ github.repository }}"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Setup MSVC
        if: steps.check-cache.outputs.skip != 'true'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Download Qt dependency
        if: steps.check-cache.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release download "$DEPS_TAG" -p "qt6-windows-x64.zip" --repo "${{ github.repository }}"
          mkdir -p D:/deps-build/deps
          unzip -q qt6-windows-x64.zip -d D:/deps-build/deps

      - name: Build QWindowKit
        if: steps.check-cache.outputs.skip != 'true'
        shell: pwsh
        run: |
          ./scripts/build-deps-windows.ps1 -TargetDir "D:\deps-build" -OutputDir "D:\deps-output" -Target qwindowkit

      - name: Upload QWindowKit package
        if: steps.check-cache.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release view "$DEPS_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 || {
            gh release create "$DEPS_TAG" --prerelease --title "$DEPS_TAG" --notes "Pre-compiled dependencies" --repo "${{ github.repository }}"
          }
          gh release upload "$DEPS_TAG" "D:/deps-output/qwindowkit-windows-x64.zip" --clobber --repo "${{ github.repository }}"
