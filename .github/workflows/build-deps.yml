name: Build Dependencies

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Component to build (all, ffmpeg, qt6, qwindowkit)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ffmpeg
          - qt6
          - qwindowkit
      arch:
        description: 'Architecture to build (all, arm64, x64)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - arm64
          - x64
      qt_version:
        description: 'Qt version to compile (if building qt6 or all)'
        required: false
        default: '6.5.9'
      ffmpeg_version:
        description: 'FFmpeg version to compile (if building ffmpeg or all)'
        required: false
        default: '8.1.1'
      copy_from_tag:
        description: 'Base release tag to copy other unchanged dependencies from (auto-detect if empty)'
        required: false
        default: ''
      deps_tag:
        description: 'Tag for the dependency release (e.g. deps-v1)'
        required: true
        default: 'deps-v1.3'
      force_rebuild:
        description: 'Force rebuild all dependencies (do not copy/download existing ones)'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'trigger-deps-*'

permissions:
  contents: write

jobs:
  build-deps:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x64
            runner: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - name: Setup environment variables
        run: |
          # 1. Determine the source of trigger
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "TARGET=${{ inputs.target }}" >> "$GITHUB_ENV"
            echo "ARCH=${{ inputs.arch }}" >> "$GITHUB_ENV"
            echo "QT_VERSION=${{ inputs.qt_version }}" >> "$GITHUB_ENV"
            echo "FFMPEG_VERSION=${{ inputs.ffmpeg_version }}" >> "$GITHUB_ENV"
            echo "COPY_FROM_TAG=${{ inputs.copy_from_tag }}" >> "$GITHUB_ENV"
            echo "DEPS_TAG=${{ inputs.deps_tag }}" >> "$GITHUB_ENV"
            echo "FORCE_REBUILD=${{ inputs.force_rebuild }}" >> "$GITHUB_ENV"
          else
            # Triggered by push of tag, e.g., refs/tags/trigger-deps-v1.2
            REF_NAME="${{ github.ref_name }}"
            if [[ "$REF_NAME" =~ ^trigger-deps-(.+)$ ]]; then
              TAG_SUFFIX="${BASH_REMATCH[1]}"
              echo "DEPS_TAG=deps-$TAG_SUFFIX" >> "$GITHUB_ENV"
            else
              echo "DEPS_TAG=deps-v1.3" >> "$GITHUB_ENV"
            fi
            echo "TARGET=all" >> "$GITHUB_ENV"
            echo "ARCH=all" >> "$GITHUB_ENV"
            echo "QT_VERSION=6.5.9" >> "$GITHUB_ENV"
            echo "FFMPEG_VERSION=8.1.1" >> "$GITHUB_ENV"
            echo "COPY_FROM_TAG=" >> "$GITHUB_ENV"
            echo "FORCE_REBUILD=false" >> "$GITHUB_ENV"
          fi

      - name: Free up disk space
        run: |
          echo "Before cleanup:"
          df -h /
          # Remove pre-installed software we don't need
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/go
          sudo rm -rf /opt/hostedtoolcache/node
          sudo rm -rf /opt/hostedtoolcache/python
          sudo rm -rf /opt/hostedtoolcache/ruby
          echo "After cleanup:"
          df -h /

      - name: Install build tools
        if: ${{ env.ARCH == 'all' || env.ARCH == matrix.arch }}
        run: |
          brew install autoconf automake libtool nasm yasm pkg-config cmake zstd

      - name: Find base deps tag
        if: ${{ env.ARCH == 'all' || env.ARCH == matrix.arch }}
        id: find-base-deps
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n "$COPY_FROM_TAG" ]]; then
            echo "tag=$COPY_FROM_TAG" >> "$GITHUB_OUTPUT"
            echo "Using manually specified base tag: $COPY_FROM_TAG"
          else
            TARGET_TAG="$DEPS_TAG"
            BASE_TAG=$(gh release list --limit 100 | cut -f1 | \
              grep -E "^deps-v" | grep -v -x "$TARGET_TAG" | head -n 1 || true)
            
            if [[ -z "$BASE_TAG" ]]; then
              echo "Warning: No previous deps release found to copy from." >&2
              echo "tag=" >> "$GITHUB_OUTPUT"
            else
              echo "tag=$BASE_TAG" >> "$GITHUB_OUTPUT"
              echo "Auto-detected base tag: $BASE_TAG"
            fi
          fi

      - name: Pre-download existing dependencies from base release
        if: ${{ env.FORCE_REBUILD != 'true' && steps.find-base-deps.outputs.tag != '' && (env.ARCH == 'all' || env.ARCH == matrix.arch) }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p "${{ runner.temp }}/deps-output"
          cd "${{ runner.temp }}/deps-output"
          
          echo "Attempting to pre-download existing compiled dependencies from tag ${{ steps.find-base-deps.outputs.tag }}..."
          for comp in ffmpeg qt6 qwindowkit; do
            # If the user explicitly requested to build a single component, do NOT download it so it gets compiled
            if [[ "$TARGET" == "all" || "$TARGET" != "$comp" ]]; then
              file_name="${comp}-macos-${{ matrix.arch }}.tar.zst"
              echo "Downloading $file_name from ${{ steps.find-base-deps.outputs.tag }}..."
              if gh release download "${{ steps.find-base-deps.outputs.tag }}" -p "$file_name" --repo "${{ github.repository }}" 2>/dev/null; then
                echo "Successfully downloaded $file_name"
              else
                echo "Could not download $file_name (will be compiled if needed)"
              fi
            else
              echo "Skipping download of $comp because it is the build target"
            fi
          done

      - name: Build dependencies
        if: ${{ env.ARCH == 'all' || env.ARCH == matrix.arch }}
        run: |
          ./scripts/build-deps-macos.sh \
            --arch ${{ matrix.arch }} \
            --output ${{ runner.temp }}/deps-output \
            --qt-version $QT_VERSION \
            --ffmpeg-version $FFMPEG_VERSION \
            --target $TARGET \
            --jobs $(sysctl -n hw.ncpu)

      - name: Upload dependency package
        if: ${{ env.ARCH == 'all' || env.ARCH == matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure the release exists first
          gh release view "$DEPS_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 || {
            echo "Release $DEPS_TAG not found. Creating it..."
            gh release create "$DEPS_TAG" \
              --prerelease \
              --title "$DEPS_TAG" \
              --notes "Pre-compiled dependencies for macOS" \
              --repo "${{ github.repository }}"
          }

          cd "${{ runner.temp }}/deps-output"
          # Check if there are any .tar.zst files to upload
          shopt -s nullglob
          files=( *.tar.zst )
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "Error: No packages compiled or copied!" >&2
            exit 1
          fi
          for file in "${files[@]}"; do
            echo "Uploading $(du -h "$file" | cut -f1) package: $file..."
            gh release upload "$DEPS_TAG" "$file" \
              --clobber \
              --repo "${{ github.repository }}"
          done

  build-deps-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment variables
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "DEPS_TAG=${{ inputs.deps_tag }}" >> "$GITHUB_ENV"
            echo "QT_VERSION=${{ inputs.qt_version }}" >> "$GITHUB_ENV"
            echo "FFMPEG_VERSION=${{ inputs.ffmpeg_version }}" >> "$GITHUB_ENV"
          else
            REF_NAME="${{ github.ref_name }}"
            if [[ "$REF_NAME" =~ ^trigger-deps-(.+)$ ]]; then
              TAG_SUFFIX="${BASH_REMATCH[1]}"
              echo "DEPS_TAG=deps-$TAG_SUFFIX" >> "$GITHUB_ENV"
            else
              echo "DEPS_TAG=deps-v1.3" >> "$GITHUB_ENV"
            fi
            echo "QT_VERSION=6.5.9" >> "$GITHUB_ENV"
            echo "FFMPEG_VERSION=8.1.1" >> "$GITHUB_ENV"
          fi

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          install: make diffutils pkgconf yasm git

      - name: Build dependencies
        shell: pwsh
        run: |
          ./scripts/build-deps-windows.ps1 -TargetDir "D:\deps-build" -OutputDir "D:\deps-output" -QtVersion "$env:QT_VERSION" -FFmpegVersion "$env:FFMPEG_VERSION"

      - name: Upload dependency package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release view "$DEPS_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 || {
            echo "Release $DEPS_TAG not found. Creating it..."
            gh release create "$DEPS_TAG" \
              --prerelease \
              --title "$DEPS_TAG" \
              --notes "Pre-compiled dependencies for Windows" \
              --repo "${{ github.repository }}"
          }

          cd "D:/deps-output"
          for file in *.zip; do
            echo "Uploading $file..."
            gh release upload "$DEPS_TAG" "$file" --clobber --repo "${{ github.repository }}"
          done

