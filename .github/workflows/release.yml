name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x64
            runner: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          modules: 'qtmultimedia qtsvg'
          cache: true

      - name: Install FFmpeg
        run: |
          brew install ffmpeg
          echo "FFmpeg installed:"
          ffmpeg -version | head -1
          echo "VideoToolbox encoders:"
          ffmpeg -encoders 2>/dev/null | grep videotoolbox || echo "None found"

      - name: Build QWindowKit
        run: |
          git clone --recursive https://github.com/stdware/qwindowkit.git /tmp/qwindowkit
          cd /tmp/qwindowkit
          git checkout 1.5.0
          git submodule update --init --recursive
          mkdir build && cd build
          cmake .. \
            -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" \
            -DCMAKE_INSTALL_PREFIX=/tmp/qwindowkit-install \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DBUILD_SHARED_LIBS=ON
          cmake --build . -j$(sysctl -n hw.ncpu)
          cmake --install .

      - name: Build and package
        run: |
          ./scripts/package-macos.sh \
            --qt "${{ env.Qt6_DIR }}" \
            --qwindowkit /tmp/qwindowkit-install \
            --arch "${{ matrix.arch }}" \
            --version "${{ steps.version.outputs.version }}"

      - name: Archive App Bundle
        run: |
          tar -cf subtitles-editor-${{ matrix.arch }}.tar -C cmake-build-release subtitles-editor.app

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.arch }}
          path: subtitles-editor-${{ matrix.arch }}.tar

  universal:
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download arm64 app bundle
        uses: actions/download-artifact@v4
        with:
          name: app-arm64
          path: artifacts/arm64

      - name: Download x64 app bundle
        uses: actions/download-artifact@v4
        with:
          name: app-x64
          path: artifacts/x64

      - name: Extract App Bundles
        run: |
          mkdir -p arm64-build x64-build
          tar -xf artifacts/arm64/subtitles-editor-arm64.tar -C arm64-build
          tar -xf artifacts/x64/subtitles-editor-x64.tar -C x64-build

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Merge into Universal App Bundle
        run: |
          ./scripts/merge-universal-macos.sh \
            arm64-build/subtitles-editor.app \
            x64-build/subtitles-editor.app \
            subtitles-editor.app

      - name: Create Universal DMG
        run: |
          STAGING_DIR=$(mktemp -d)
          cp -a subtitles-editor.app "$STAGING_DIR/"
          ln -sf /Applications "$STAGING_DIR/Applications"
          mkdir -p dist/macos

          VERSION="${{ steps.version.outputs.version }}"
          DMG_NAME="SubtitlesEditor-${VERSION}-macOS-universal"
          hdiutil create -volname "$DMG_NAME" \
              -srcfolder "$STAGING_DIR" \
              -ov -format UDZO \
              "dist/macos/$DMG_NAME.dmg"
          rm -rf "$STAGING_DIR"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-universal
          path: dist/macos/*.dmg

  release:
    needs: universal
    runs-on: ubuntu-latest
    steps:
      - name: Download Universal DMG
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: dmg-*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.dmg
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
