name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.1.4, leave empty to auto-increment latest vX.Y.Z)'
        required: false
        default: ''
      deps_tag:
        description: 'Dependencies release tag (auto-detect if empty)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  setup-env:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.env.outputs.version }}
      tag_name: ${{ steps.env.outputs.tag_name }}
    steps:
      - name: Compute release version
        id: env
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_NAME="${{ github.ref_name }}"
            VERSION="${TAG_NAME#v}"
          elif [[ -n "${{ inputs.release_tag }}" ]]; then
            TAG_NAME="${{ inputs.release_tag }}"
            VERSION="${TAG_NAME#v}"
          else
            LATEST_TAG=$(gh release list --limit 100 --repo "${{ github.repository }}" | cut -f1 | \
              grep -E "^v[0-9]" | head -n 1 || true)
            if [[ -z "$LATEST_TAG" ]]; then
              TAG_NAME="v1.0.0"
            else
              VERSION_PART="${LATEST_TAG#v}"
              IFS='.' read -r major minor patch <<< "$VERSION_PART"
              new_patch=$((patch + 1))
              TAG_NAME="v${major}.${minor}.${new_patch}"
            fi
            VERSION="${TAG_NAME#v}"
          fi
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME, version=$VERSION"

  build:
    needs: setup-env
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x64
            runner: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          brew install zstd x264 x265

      - name: Find deps tag
        id: find-deps
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n "${{ inputs.deps_tag }}" ]]; then
            echo "tag=${{ inputs.deps_tag }}" >> "$GITHUB_OUTPUT"
          else
            DEPS_TAG=$(gh release list --limit 100 --json tagName -q \
              '[.[] | select(.tagName | startswith("deps-v"))] | sort_by(.tagName) | last | .tagName')
            if [[ -z "$DEPS_TAG" ]]; then
              echo "Error: No deps release found. Run build-deps workflow first." >&2
              exit 1
            fi
            echo "tag=$DEPS_TAG" >> "$GITHUB_OUTPUT"
          fi
          echo "Using dependencies from: ${{ steps.find-deps.outputs.tag }}"

      - name: Download dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.find-deps.outputs.tag }}" \
            -p "ffmpeg-macos-${{ matrix.arch }}.tar.zst" \
            -p "qt6-macos-${{ matrix.arch }}.tar.zst" \
            -p "qwindowkit-macos-${{ matrix.arch }}.tar.zst" \
            -p "whisper-macos-${{ matrix.arch }}.tar.zst" \
            -p "sentry-macos-${{ matrix.arch }}.tar.zst" \
            --repo "${{ github.repository }}"
          for lib in ffmpeg qt6 qwindowkit whisper sentry; do
            zstd -d "${lib}-macos-${{ matrix.arch }}.tar.zst"
            tar -xf "${lib}-macos-${{ matrix.arch }}.tar"
            rm -f "${lib}-macos-${{ matrix.arch }}.tar" "${lib}-macos-${{ matrix.arch }}.tar.zst"
          done

      - name: Build and package
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          ./scripts/package-macos.sh \
            --deps-dir "$PWD" \
            --arch "${{ matrix.arch }}" \
            --version "${{ needs.setup-env.outputs.version }}" \
            --sentry-dsn "$SENTRY_DSN"

      - name: Upload Debug Symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [[ -z "$SENTRY_AUTH_TOKEN" ]]; then
            echo "SENTRY_AUTH_TOKEN is not set, skipping symbol upload."
            exit 0
          fi
          npx --yes @sentry/cli debug-files upload --include-sources cmake-build-release/

      - name: Archive App Bundle
        run: |
          tar -cf subtitles-editor-${{ matrix.arch }}.tar -C cmake-build-release subtitles-editor.app

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.arch }}
          path: subtitles-editor-${{ matrix.arch }}.tar


  build-windows:
    needs: setup-env
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find deps tag
        id: find-deps
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [[ -n "${{ inputs.deps_tag }}" ]]; then
            echo "tag=${{ inputs.deps_tag }}" >> "$GITHUB_OUTPUT"
          else
            DEPS_TAG=$(gh release list --limit 100 --json tagName -q \
              '[.[] | select(.tagName | startswith("deps-v"))] | sort_by(.tagName) | last | .tagName')
            if [[ -z "$DEPS_TAG" ]]; then
              echo "Error: No deps release found. Run build-deps workflow first." >&2
              exit 1
            fi
            echo "tag=$DEPS_TAG" >> "$GITHUB_OUTPUT"
          fi
          echo "Using dependencies from: ${{ steps.find-deps.outputs.tag }}"

      - name: Download dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release download "${{ steps.find-deps.outputs.tag }}" \
            -p "ffmpeg-windows-x64.zip" \
            -p "qt6-windows-x64.zip" \
            -p "qwindowkit-windows-x64.zip" \
            -p "whisper-windows-x64.zip" \
            -p "sentry-windows-x64.zip" \
            --repo "${{ github.repository }}"
          unzip -q ffmpeg-windows-x64.zip -d deps_ffmpeg
          unzip -q qt6-windows-x64.zip -d deps_qt6
          unzip -q qwindowkit-windows-x64.zip -d deps_qwindowkit
          unzip -q whisper-windows-x64.zip -d deps_whisper
          unzip -q sentry-windows-x64.zip -d deps_sentry
          echo "FFMPEG_ROOT=$PWD/deps_ffmpeg/ffmpeg" >> $GITHUB_ENV
          echo "QT_DIR=$PWD/deps_qt6/qt6" >> $GITHUB_ENV
          echo "QWindowKit_ROOT=$PWD/deps_qwindowkit/qwindowkit" >> $GITHUB_ENV
          echo "WHISPER_ROOT=$PWD/deps_whisper/whisper" >> $GITHUB_ENV
          echo "SENTRY_ROOT=$PWD/deps_sentry/sentry" >> $GITHUB_ENV

      - name: Build
        shell: bash
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          cmake -B cmake-build-release -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_DIR" -DFFMPEG_ROOT="$FFMPEG_ROOT" -DQWindowKit_ROOT="$QWindowKit_ROOT" -Dwhisper_ROOT="$WHISPER_ROOT" -Dsentry_ROOT="$SENTRY_ROOT" -DSENTRY_DSN="$SENTRY_DSN"
          cmake --build cmake-build-release --config Release

      - name: Package
        shell: bash
        run: |
          mkdir -p dist/windows/SubtitlesEditor-${{ needs.setup-env.outputs.version }}-Windows-x64
          cp cmake-build-release/Release/subtitles-editor.exe dist/windows/SubtitlesEditor-${{ needs.setup-env.outputs.version }}-Windows-x64/
          
          # Copy Sentry crashpad_handler.exe
          cp $SENTRY_ROOT/bin/crashpad_handler.exe dist/windows/SubtitlesEditor-${{ needs.setup-env.outputs.version }}-Windows-x64/
          
          # Deploy Qt
          $QT_DIR/bin/windeployqt.exe --release --no-compiler-runtime --no-opengl-sw --no-translations dist/windows/SubtitlesEditor-${{ needs.setup-env.outputs.version }}-Windows-x64/subtitles-editor.exe
          
          # Copy FFmpeg, QWindowKit and Whisper DLLs
          cp $FFMPEG_ROOT/bin/*.dll dist/windows/SubtitlesEditor-${{ needs.setup-env.outputs.version }}-Windows-x64/
          cp $QWindowKit_ROOT/bin/*.dll dist/windows/SubtitlesEditor-${{ needs.setup-env.outputs.version }}-Windows-x64/
          cp $WHISPER_ROOT/bin/*.dll dist/windows/SubtitlesEditor-${{ needs.setup-env.outputs.version }}-Windows-x64/
          
          cd dist/windows
          tar.exe -a -c -f SubtitlesEditor-${{ needs.setup-env.outputs.version }}-Windows-x64.zip SubtitlesEditor-${{ needs.setup-env.outputs.version }}-Windows-x64

      - name: Upload Debug Symbols to Sentry
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [[ -z "$SENTRY_AUTH_TOKEN" ]]; then
            echo "SENTRY_AUTH_TOKEN is not set, skipping symbol upload."
            exit 0
          fi
          npx --yes @sentry/cli debug-files upload --include-sources cmake-build-release/

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: zip-windows
          path: dist/windows/*.zip

  universal:
    needs: [setup-env, build]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download arm64 app bundle
        uses: actions/download-artifact@v4
        with:
          name: app-arm64
          path: artifacts/arm64

      - name: Download x64 app bundle
        uses: actions/download-artifact@v4
        with:
          name: app-x64
          path: artifacts/x64

      - name: Extract App Bundles
        run: |
          mkdir -p arm64-build x64-build
          tar -xf artifacts/arm64/subtitles-editor-arm64.tar -C arm64-build
          tar -xf artifacts/x64/subtitles-editor-x64.tar -C x64-build

      - name: Merge into Universal App Bundle
        run: |
          ./scripts/merge-universal-macos.sh \
            arm64-build/subtitles-editor.app \
            x64-build/subtitles-editor.app \
            subtitles-editor.app

      - name: Create Universal DMG
        run: |
          STAGING_DIR=$(mktemp -d)
          cp -a subtitles-editor.app "$STAGING_DIR/"
          ln -sf /Applications "$STAGING_DIR/Applications"
          mkdir -p dist/macos

          VERSION="${{ needs.setup-env.outputs.version }}"
          DMG_NAME="SubtitlesEditor-${VERSION}-macOS-universal"
          hdiutil create -volname "$DMG_NAME" \
              -srcfolder "$STAGING_DIR" \
              -ov -format UDZO \
              "dist/macos/$DMG_NAME.dmg"
          rm -rf "$STAGING_DIR"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-universal
          path: dist/macos/*.dmg

  release:
    needs: [setup-env, universal, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup-env.outputs.tag_name }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
