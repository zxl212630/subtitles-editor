name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      deps_tag:
        description: 'Dependencies release tag (auto-detect if empty)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x64
            runner: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          brew install zstd

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Find deps tag
        id: find-deps
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n "${{ inputs.deps_tag }}" ]]; then
            echo "tag=${{ inputs.deps_tag }}" >> "$GITHUB_OUTPUT"
          else
            DEPS_TAG=$(gh release list --limit 100 --json tagName -q \
              '[.[] | select(.tagName | startswith("deps-v"))] | sort_by(.tagName) | last | .tagName')
            if [[ -z "$DEPS_TAG" ]]; then
              echo "Error: No deps release found. Run build-deps workflow first." >&2
              exit 1
            fi
            echo "tag=$DEPS_TAG" >> "$GITHUB_OUTPUT"
          fi
          echo "Using dependencies from: ${{ steps.find-deps.outputs.tag }}"

      - name: Download dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.find-deps.outputs.tag }}" \
            -p "ffmpeg-macos-${{ matrix.arch }}.tar.zst" \
            -p "qt6-macos-${{ matrix.arch }}.tar.zst" \
            -p "qwindowkit-macos-${{ matrix.arch }}.tar.zst" \
            --repo "${{ github.repository }}"
          for lib in ffmpeg qt6 qwindowkit; do
            zstd -d "${lib}-macos-${{ matrix.arch }}.tar.zst"
            tar -xf "${lib}-macos-${{ matrix.arch }}.tar"
            rm -f "${lib}-macos-${{ matrix.arch }}.tar" "${lib}-macos-${{ matrix.arch }}.tar.zst"
          done

      - name: Build and package
        run: |
          ./scripts/package-macos.sh \
            --deps-dir "$PWD" \
            --arch "${{ matrix.arch }}" \
            --version "${{ steps.version.outputs.version }}"

      - name: Archive App Bundle
        run: |
          tar -cf subtitles-editor-${{ matrix.arch }}.tar -C cmake-build-release subtitles-editor.app

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.arch }}
          path: subtitles-editor-${{ matrix.arch }}.tar


  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Install FFmpeg
        shell: bash
        run: |
          curl -L -o ffmpeg.zip "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          unzip -q ffmpeg.zip
          mv ffmpeg-master-latest-win64-gpl-shared deps_ffmpeg
          echo "FFMPEG_ROOT=$PWD/deps_ffmpeg" >> $GITHUB_ENV

      - name: Build QWindowKit
        shell: bash
        run: |
          git clone --recursive https://github.com/stdware/qwindowkit.git
          cd qwindowkit
          git checkout 1.5.0
          git submodule update --init --recursive
          cmake -B build -DCMAKE_INSTALL_PREFIX="../deps_qwindowkit" -DCMAKE_PREFIX_PATH="$QT_DIR" -DBUILD_SHARED_LIBS=ON
          cmake --build build --config Release
          cmake --install build --config Release
          cd ..
          echo "QWindowKit_ROOT=$PWD/deps_qwindowkit" >> $GITHUB_ENV

      - name: Build
        shell: bash
        run: |
          cmake -B cmake-build-release -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_DIR" -DFFMPEG_ROOT="$FFMPEG_ROOT" -DQWindowKit_ROOT="$QWindowKit_ROOT"
          cmake --build cmake-build-release --config Release

      - name: Package
        shell: bash
        run: |
          mkdir -p dist/windows/SubtitlesEditor-${{ steps.version.outputs.version }}-Windows-x64
          cp cmake-build-release/Release/subtitles-editor.exe dist/windows/SubtitlesEditor-${{ steps.version.outputs.version }}-Windows-x64/
          
          # Deploy Qt
          windeployqt --release --no-compiler-runtime --no-opengl-sw --no-translations dist/windows/SubtitlesEditor-${{ steps.version.outputs.version }}-Windows-x64/subtitles-editor.exe
          
          # Copy FFmpeg and QWindowKit DLLs
          cp $FFMPEG_ROOT/bin/*.dll dist/windows/SubtitlesEditor-${{ steps.version.outputs.version }}-Windows-x64/
          cp $QWindowKit_ROOT/bin/*.dll dist/windows/SubtitlesEditor-${{ steps.version.outputs.version }}-Windows-x64/
          
          cd dist/windows
          tar.exe -a -c -f SubtitlesEditor-${{ steps.version.outputs.version }}-Windows-x64.zip SubtitlesEditor-${{ steps.version.outputs.version }}-Windows-x64

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: zip-windows
          path: dist/windows/*.zip

  universal:
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download arm64 app bundle
        uses: actions/download-artifact@v4
        with:
          name: app-arm64
          path: artifacts/arm64

      - name: Download x64 app bundle
        uses: actions/download-artifact@v4
        with:
          name: app-x64
          path: artifacts/x64

      - name: Extract App Bundles
        run: |
          mkdir -p arm64-build x64-build
          tar -xf artifacts/arm64/subtitles-editor-arm64.tar -C arm64-build
          tar -xf artifacts/x64/subtitles-editor-x64.tar -C x64-build

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Merge into Universal App Bundle
        run: |
          ./scripts/merge-universal-macos.sh \
            arm64-build/subtitles-editor.app \
            x64-build/subtitles-editor.app \
            subtitles-editor.app

      - name: Create Universal DMG
        run: |
          STAGING_DIR=$(mktemp -d)
          cp -a subtitles-editor.app "$STAGING_DIR/"
          ln -sf /Applications "$STAGING_DIR/Applications"
          mkdir -p dist/macos

          VERSION="${{ steps.version.outputs.version }}"
          DMG_NAME="SubtitlesEditor-${VERSION}-macOS-universal"
          hdiutil create -volname "$DMG_NAME" \
              -srcfolder "$STAGING_DIR" \
              -ov -format UDZO \
              "dist/macos/$DMG_NAME.dmg"
          rm -rf "$STAGING_DIR"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-universal
          path: dist/macos/*.dmg

  release:
    needs: [universal, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
